<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Digital Tanjung Nyiur</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1a3a5f; width: 100%; max-width: 400px; padding: 30px; text-align: center; border-radius: 15px; color: white; }
        .card { background: white; color: #333; padding: 25px; border-radius: 15px; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { width: 80%; padding: 15px; margin: 20px 0; border: 2px solid #ddd; border-radius: 10px; text-align: center; font-size: 20px; letter-spacing: 10px; }
        button { background: #357abd; color: white; border: none; padding: 15px 30px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        .logo { width: 80px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://i.imgur.com/G5y19zY.png" class="logo" alt="Logo"> <h3>ZZ ABSENSI DIGITAL</h3>
    <p>Desa Tanjung Nyiur • Kec. Pulau Sembilan<br>Kab. Kotabaru, Kalimantan Selatan</p>

    <div class="card">
        <h4>Verifikasi Masuk</h4>
        <p>Masukkan PIN Akses:</p>
        <input type="password" id="pin" maxlength="4" placeholder="....">
        <button onclick="cekPin()">MASUK APLIKASI</button>
    </div>
</div>

<script>
    function cekPin() {
        const pin = document.getElementById('pin').value;
        if(pin === "1234") { // Ganti dengan PIN yang diinginkan
            alert("Memverifikasi Lokasi...");
            // Langsung ambil lokasi setelah PIN benar
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                localStorage.setItem("userLat", lat);
                localStorage.setItem("userLon", lon);
                window.location.href = "absen.html"; // Arahkan ke halaman kamera absensi
            }, () => {
                alert("GPS wajib aktif untuk masuk!");
            });
        } else {
            alert("PIN Salah!");
        }
    }
</script>
</body>
</html>
