<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Absensi</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        #kamera { width: 100%; max-width: 300px; border-radius: 10px; background: #ddd; }
        .btn-absen { background: #28a745; color: white; padding: 15px 30px; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <h3>Silakan Lakukan Absensi</h3>
    <video id="kamera" autoplay playsinline></video>
    <br>
    <p id="infoLokasi">Mengecek lokasi...</p>
    <button class="btn-absen" onclick="kirimAbsen()">KONFIRMASI ABSENSI</button>

    <script>
        // 1. Inisialisasi Kamera
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('kamera').srcObject = stream;
            } catch (err) {
                alert("Kamera tidak ditemukan atau izin ditolak.");
            }
        }

        // 2. Tampilkan Koordinat dari Login
        const lat = localStorage.getItem("userLat");
        const lon = localStorage.getItem("userLon");
        document.getElementById('infoLokasi').innerText = `Lokasi Terdeteksi: ${lat}, ${lon}`;

        // 3. Fungsi Kirim Data
        function kirimAbsen() {
            // Di sini nanti Bapak panggil fungsi untuk kirim ke Google Sheets
            // seperti yang kita bahas sebelumnya
            alert("Absensi berhasil tercatat dengan koordinat: " + lat + ", " + lon);
        }

        startCamera();
    </script>

</body>
</html>
