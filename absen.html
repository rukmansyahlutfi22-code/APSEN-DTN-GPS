<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Desa</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f9; padding: 15px; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #kamera { width: 100%; border-radius: 10px; background: #000; }
        .btn-confirm { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th, td { border-bottom: 1px solid #eee; padding: 8px; text-align: left; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Profil Perangkat</h3>
        <p>Nama: <b>Rukmansyah</b></p>
        <p>Jabatan: <b>Sekretaris</b></p>
    </div>

    <div class="card">
        <video id="kamera" autoplay playsinline></video>
        <p id="info">Lokasi: Mencari...</p>
        <button class="btn-confirm" onclick="kirim()">KONFIRMASI ABSENSI</button>
    </div>

    <div class="card">
        <h3>Riwayat Absensi</h3>
        <table>
            <thead><tr><th>Waktu</th><th>Status</th></tr></thead>
            <tbody id="bodyRiwayat"></tbody>
        </table>
    </div>

    <script>
        // Jalankan Kamera
        async function start() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('kamera').srcObject = stream;
            } catch (e) { alert("Izinkan kamera!"); }
        }
        
        // Deteksi Lokasi
        navigator.geolocation.getCurrentPosition(pos => {
            document.getElementById('info').innerText = "Lokasi: " + pos.coords.latitude + ", " + pos.coords.longitude;
        });

        // Fungsi Kirim
        function kirim() {
            const URL = "ISI_URL_GOOGLE_SHEET_DISINI"; 
            const data = { nama: "Rukmansyah", lokasi: document.getElementById('info').innerText };
            
            fetch(URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) })
            .then(() => {
                alert("Berhasil!");
                let row = document.getElementById("bodyRiwayat").insertRow(0);
                row.insertCell(0).innerText = new Date().toLocaleTimeString();
                row.insertCell(1).innerText = "HADIR";
            });
        }
        start();
    </script>
</body>
</html>
